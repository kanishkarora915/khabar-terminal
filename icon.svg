<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b16"/>
      <stop offset="100%" stop-color="#0c1221"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.5"/>
  <!-- Chart line behind -->
  <path d="M80 380 L140 340 L200 360 L250 280 L300 300 L340 220 L380 240 L430 150" fill="none" stroke="#00ccff" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
  <path d="M80 380 L140 340 L200 360 L250 280 L300 300 L340 220 L380 240 L430 150 L430 420 L80 420 Z" fill="url(#chart)" opacity="0.15"/>
  <!-- Candlesticks -->
  <!-- Green candle 1 -->
  <line x1="140" y1="300" x2="140" y2="360" stroke="#00e676" stroke-width="2"/>
  <rect x="132" y="315" width="16" height="30" rx="2" fill="#00e676"/>
  <!-- Red candle 2 -->
  <line x1="200" y1="310" x2="200" y2="380" stroke="#ff3355" stroke-width="2"/>
  <rect x="192" y="320" width="16" height="40" rx="2" fill="#ff3355"/>
  <!-- Green candle 3 -->
  <line x1="260" y1="250" x2="260" y2="320" stroke="#00e676" stroke-width="2"/>
  <rect x="252" y="260" width="16" height="35" rx="2" fill="#00e676"/>
  <!-- Green candle 4 big -->
  <line x1="320" y1="200" x2="320" y2="300" stroke="#00e676" stroke-width="2"/>
  <rect x="312" y="210" width="16" height="60" rx="2" fill="#00e676"/>
  <!-- Red candle 5 -->
  <line x1="380" y1="180" x2="380" y2="260" stroke="#ff3355" stroke-width="2"/>
  <rect x="372" y="200" width="16" height="40" rx="2" fill="#ff3355"/>
  <!-- K letter -->
  <text x="256" y="200" font-family="Inter, Arial, sans-serif" font-size="160" font-weight="900" fill="url(#glow)" text-anchor="middle" dominant-baseline="central" letter-spacing="4">K</text>
  <!-- KHABAR text -->
  <text x="256" y="430" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="url(#glow)" text-anchor="middle" letter-spacing="12">KHABAR</text>
  <!-- Subtle pulse dot -->
  <circle cx="430" cy="90" r="8" fill="#00e676" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
