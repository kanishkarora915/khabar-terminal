[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["https"]

[functions."kite"]
  timeout = 26

[functions."nse"]
  # BSE forthcoming-results + NSE archives calls can take a few seconds; give the
  # function more than the 10s default so a slow upstream doesn't get cut off.
  timeout = 26

[functions."auth"]
  timeout = 15

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/nse"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
